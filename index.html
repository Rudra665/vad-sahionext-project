<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VAD Avatar</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<!-- Loading overlay -->
		<div id="loading">
			<div class="loading-ring"></div>
			<div class="loading-text">INITIALIZING</div>
		</div>

		<!-- Header -->
		<header>
			<div class="logo">VAD · AVATAR</div>
			<div class="status-pill">
				<div class="status-dot" id="ws-dot"></div>
				<span id="ws-label">DISCONNECTED</span>
			</div>
		</header>

		<!-- Main -->
		<div class="main">
			<!-- Avatar canvas / fallback -->
			<div class="avatar-section" id="avatar-section">
				<canvas id="canvas"></canvas>

				<!-- Fallback shown if no VRM -->
				<div
					class="fallback-avatar"
					id="fallback"
					style="display: none"
				>
					<div class="fallback-ring"></div>
					<div class="fallback-ring"></div>
					<div class="fallback-ring"></div>
					<div class="fallback-face">
						<div class="fallback-eyes">
							<div class="fallback-eye"></div>
							<div class="fallback-eye"></div>
						</div>
						<div class="fallback-mouth" id="fallback-mouth"></div>
					</div>
				</div>

				<!-- Waveform -->
				<div class="waveform" id="waveform">
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
				</div>
			</div>

			<!-- Right panel -->
			<div class="panel">
				<!-- Transcription -->
				<div>
					<div class="panel-label">Transcription</div>
					<div class="transcription-box" id="transcription-box">
						<span
							id="transcription-text"
							style="color: #475569; font-style: italic"
							>Waiting for speech...</span
						>
					</div>
				</div>

				<!-- Keywords -->
				<div class="keywords-section">
					<div class="panel-label">Keywords</div>
					<div id="keywords-container"></div>
				</div>

				<!-- History -->
				<div class="history-section">
					<div class="panel-label">History</div>
					<div id="history-log"></div>
				</div>
			</div>
		</div>

		<!-- Three.js + VRM -->
		<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1/lib/three-vrm.js"></script>
		<script src="./settings.js"></script>
	</body>
</html>
