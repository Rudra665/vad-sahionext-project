<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VAD Avatar</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap");

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #050810;
				--surface: #0d1117;
				--cyan: #00f5ff;
				--purple: #b44fff;
				--pink: #ff2d78;
				--text: #e2e8f0;
				--muted: #475569;
				--glow-cyan: 0 0 20px #00f5ff66;
				--glow-purple: 0 0 20px #b44fff66;
			}

			body {
				background: var(--bg);
				color: var(--text);
				font-family: "Inter", sans-serif;
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			/* Header */
			header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px 28px;
				border-bottom: 1px solid #ffffff0d;
				background: #0d111799;
				backdrop-filter: blur(10px);
				z-index: 10;
			}

			.logo {
				font-family: "Orbitron", monospace;
				font-weight: 900;
				font-size: 1.1rem;
				background: linear-gradient(90deg, var(--cyan), var(--purple));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				letter-spacing: 2px;
			}

			.status-pill {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 0.75rem;
				color: var(--muted);
				font-family: "Orbitron", monospace;
				letter-spacing: 1px;
			}

			.status-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--muted);
				transition:
					background 0.3s,
					box-shadow 0.3s;
			}
			.status-dot.active {
				background: var(--cyan);
				box-shadow: var(--glow-cyan);
				animation: pulse 1.5s infinite;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.4;
				}
			}

			/* Main layout */
			.main {
				flex: 1;
				display: grid;
				grid-template-columns: 1fr 340px;
				gap: 0;
				overflow: hidden;
			}

			/* Avatar section */
			.avatar-section {
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			/* Ambient background glow */
			.avatar-section::before {
				content: "";
				position: absolute;
				width: 500px;
				height: 500px;
				background: radial-gradient(
					circle,
					#00f5ff0d 0%,
					transparent 70%
				);
				top: 50%;
				left: 50%;
				transform: translate(-50%, -60%);
				pointer-events: none;
			}

			#canvas {
				width: 100%;
				height: 100%;
				display: block;
			}

			/* Waveform bar */
			.waveform {
				position: absolute;
				bottom: 24px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				align-items: center;
				gap: 4px;
				height: 40px;
			}

			.wave-bar {
				width: 4px;
				background: var(--cyan);
				border-radius: 2px;
				height: 6px;
				opacity: 0.4;
				transition:
					height 0.1s,
					opacity 0.1s;
			}

			.waveform.speaking .wave-bar {
				animation: waveAnim 0.6s ease-in-out infinite;
				opacity: 1;
			}

			.wave-bar:nth-child(1) {
				animation-delay: 0s;
			}
			.wave-bar:nth-child(2) {
				animation-delay: 0.1s;
			}
			.wave-bar:nth-child(3) {
				animation-delay: 0.2s;
			}
			.wave-bar:nth-child(4) {
				animation-delay: 0.05s;
			}
			.wave-bar:nth-child(5) {
				animation-delay: 0.15s;
			}
			.wave-bar:nth-child(6) {
				animation-delay: 0.25s;
			}
			.wave-bar:nth-child(7) {
				animation-delay: 0.1s;
			}
			.wave-bar:nth-child(8) {
				animation-delay: 0.2s;
			}

			@keyframes waveAnim {
				0%,
				100% {
					height: 6px;
				}
				50% {
					height: 32px;
				}
			}

			/* Right panel */
			.panel {
				border-left: 1px solid #ffffff0d;
				background: #0d1117cc;
				display: flex;
				flex-direction: column;
				padding: 24px 20px;
				gap: 24px;
				overflow: hidden;
			}

			.panel-label {
				font-family: "Orbitron", monospace;
				font-size: 0.65rem;
				letter-spacing: 2px;
				color: var(--muted);
				text-transform: uppercase;
				margin-bottom: 10px;
			}

			/* Transcription box */
			.transcription-box {
				background: #ffffff05;
				border: 1px solid #ffffff0f;
				border-radius: 12px;
				padding: 16px;
				min-height: 80px;
				font-size: 0.9rem;
				line-height: 1.6;
				color: var(--text);
				position: relative;
				overflow: hidden;
			}

			.transcription-box::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 2px;
				background: linear-gradient(90deg, var(--cyan), var(--purple));
				transform: scaleX(0);
				transform-origin: left;
				transition: transform 0.4s;
			}
			.transcription-box.active::before {
				transform: scaleX(1);
			}

			#transcription-text {
				opacity: 0.85;
			}

			/* Keywords section */
			.keywords-section {
				flex: 1;
				overflow: hidden;
			}

			#keywords-container {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-content: flex-start;
			}

			.keyword-tag {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 6px 14px;
				border-radius: 999px;
				font-size: 0.8rem;
				font-weight: 600;
				letter-spacing: 0.5px;
				border: 1px solid transparent;
				animation: tagIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
				cursor: default;
				position: relative;
				overflow: hidden;
			}

			.keyword-tag::before {
				content: "";
				position: absolute;
				inset: 0;
				opacity: 0;
				transition: opacity 0.2s;
				background: inherit;
				filter: blur(8px);
			}

			.keyword-tag:hover::before {
				opacity: 0.3;
			}

			.keyword-tag.cyan {
				background: #00f5ff12;
				border-color: #00f5ff44;
				color: var(--cyan);
				box-shadow: 0 0 12px #00f5ff22;
			}
			.keyword-tag.purple {
				background: #b44fff12;
				border-color: #b44fff44;
				color: var(--purple);
				box-shadow: 0 0 12px #b44fff22;
			}
			.keyword-tag.pink {
				background: #ff2d7812;
				border-color: #ff2d7844;
				color: var(--pink);
				box-shadow: 0 0 12px #ff2d7822;
			}

			.keyword-tag .dot {
				width: 5px;
				height: 5px;
				border-radius: 50%;
				background: currentColor;
			}

			@keyframes tagIn {
				from {
					opacity: 0;
					transform: translateY(12px) scale(0.85);
				}
				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			.keyword-tag.fade-out {
				animation: tagOut 0.5s ease forwards;
			}

			@keyframes tagOut {
				to {
					opacity: 0;
					transform: scale(0.8);
				}
			}

			/* History log */
			.history-section {
				flex: 1;
				overflow: hidden;
				display: flex;
				flex-direction: column;
			}

			#history-log {
				flex: 1;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 8px;
				scrollbar-width: thin;
				scrollbar-color: #ffffff1a transparent;
			}

			.history-item {
				background: #ffffff05;
				border-left: 2px solid var(--purple);
				padding: 8px 12px;
				border-radius: 0 8px 8px 0;
				font-size: 0.78rem;
				color: var(--muted);
				animation: slideIn 0.3s ease;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateX(-8px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			.history-item .time {
				font-family: "Orbitron", monospace;
				font-size: 0.6rem;
				color: #ffffff33;
				margin-bottom: 3px;
			}

			/* Loading overlay */
			#loading {
				position: fixed;
				inset: 0;
				background: var(--bg);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 20px;
				z-index: 100;
				transition: opacity 0.6s;
			}

			#loading.hidden {
				opacity: 0;
				pointer-events: none;
			}

			.loading-ring {
				width: 60px;
				height: 60px;
				border: 2px solid #ffffff0d;
				border-top-color: var(--cyan);
				border-radius: 50%;
				animation: spin 1s linear infinite;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.loading-text {
				font-family: "Orbitron", monospace;
				font-size: 0.75rem;
				color: var(--muted);
				letter-spacing: 3px;
			}

			/* No VRM fallback avatar */
			.fallback-avatar {
				width: 200px;
				height: 200px;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.fallback-ring {
				position: absolute;
				border-radius: 50%;
				border: 1px solid;
				animation: ringPulse 3s ease-in-out infinite;
			}
			.fallback-ring:nth-child(1) {
				width: 200px;
				height: 200px;
				border-color: #00f5ff22;
				animation-delay: 0s;
			}
			.fallback-ring:nth-child(2) {
				width: 160px;
				height: 160px;
				border-color: #b44fff22;
				animation-delay: 0.5s;
			}
			.fallback-ring:nth-child(3) {
				width: 120px;
				height: 120px;
				border-color: #ff2d7822;
				animation-delay: 1s;
			}

			@keyframes ringPulse {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.5;
				}
				50% {
					transform: scale(1.05);
					opacity: 1;
				}
			}

			.fallback-face {
				width: 80px;
				height: 80px;
				background: linear-gradient(135deg, #0d1117, #1a2035);
				border-radius: 50%;
				border: 2px solid #00f5ff44;
				box-shadow: var(--glow-cyan);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 8px;
				z-index: 1;
			}

			.fallback-eyes {
				display: flex;
				gap: 14px;
			}

			.fallback-eye {
				width: 10px;
				height: 10px;
				background: var(--cyan);
				border-radius: 50%;
				box-shadow: var(--glow-cyan);
				animation: blink 4s ease-in-out infinite;
			}

			.fallback-eye:nth-child(2) {
				animation-delay: 0.1s;
			}

			@keyframes blink {
				0%,
				90%,
				100% {
					transform: scaleY(1);
				}
				95% {
					transform: scaleY(0.1);
				}
			}

			.fallback-mouth {
				width: 20px;
				height: 5px;
				background: var(--purple);
				border-radius: 999px;
				box-shadow: var(--glow-purple);
				transition:
					height 0.1s,
					border-radius 0.1s;
			}

			.fallback-mouth.speaking {
				height: 10px;
				border-radius: 4px;
				animation: mouthAnim 0.2s ease-in-out infinite alternate;
			}

			@keyframes mouthAnim {
				from {
					height: 5px;
				}
				to {
					height: 12px;
				}
			}
		</style>
	</head>
	<body>
		<!-- Loading overlay -->
		<div id="loading">
			<div class="loading-ring"></div>
			<div class="loading-text">INITIALIZING</div>
		</div>

		<!-- Header -->
		<header>
			<div class="logo">VAD · AVATAR</div>
			<div class="status-pill">
				<div class="status-dot" id="ws-dot"></div>
				<span id="ws-label">DISCONNECTED</span>
			</div>
		</header>

		<!-- Main -->
		<div class="main">
			<!-- Avatar canvas / fallback -->
			<div class="avatar-section" id="avatar-section">
				<canvas id="canvas"></canvas>

				<!-- Fallback shown if no VRM -->
				<div
					class="fallback-avatar"
					id="fallback"
					style="display: none"
				>
					<div class="fallback-ring"></div>
					<div class="fallback-ring"></div>
					<div class="fallback-ring"></div>
					<div class="fallback-face">
						<div class="fallback-eyes">
							<div class="fallback-eye"></div>
							<div class="fallback-eye"></div>
						</div>
						<div class="fallback-mouth" id="fallback-mouth"></div>
					</div>
				</div>

				<!-- Waveform -->
				<div class="waveform" id="waveform">
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
					<div class="wave-bar"></div>
				</div>
			</div>

			<!-- Right panel -->
			<div class="panel">
				<!-- Transcription -->
				<div>
					<div class="panel-label">Transcription</div>
					<div class="transcription-box" id="transcription-box">
						<span
							id="transcription-text"
							style="color: #475569; font-style: italic"
							>Waiting for speech...</span
						>
					</div>
				</div>

				<!-- Keywords -->
				<div class="keywords-section">
					<div class="panel-label">Keywords</div>
					<div id="keywords-container"></div>
				</div>

				<!-- History -->
				<div class="history-section">
					<div class="panel-label">History</div>
					<div id="history-log"></div>
				</div>
			</div>
		</div>

		<!-- Three.js + VRM -->
		<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1/lib/three-vrm.js"></script>
		<script>
			// ─── State ───────────────────────────────────────────────────────────────────
			let vrm = null;
			let isSpeaking = false;
			let currentText = "";
			let visemeQueue = [];
			let visemeIdx = 0;
			let visemeTimer = 0;
			let colors = ["cyan", "purple", "pink"];
			let colorIdx = 0;

			// ─── Viseme map: letter → VRM expression ─────────────────────────────────────
			// Maps characters in transcription text to mouth shapes
			const VISEME_MAP = {
				a: "aa",
				e: "ee",
				i: "ih",
				o: "oh",
				u: "ou",
				b: "aa",
				p: "aa",
				m: "aa",
				f: "ih",
				v: "ih",
				s: "ih",
				z: "ih",
				th: "ee",
				n: "ee",
				t: "ee",
				d: "ee",
				l: "ee",
				k: "oh",
				g: "oh",
				r: "oh",
				w: "ou",
				q: "ou",
				" ": null, // silence on space
			};

			const ALL_VISEMES = ["aa", "ih", "ou", "ee", "oh"];

			// Build a viseme queue from transcription text
			function buildVisemeQueue(text) {
				const queue = [];
				const lower = text.toLowerCase();
				for (let i = 0; i < lower.length; i++) {
					// check digraphs first
					const digraph = lower.slice(i, i + 2);
					if (VISEME_MAP[digraph]) {
						queue.push(VISEME_MAP[digraph]);
						i++; // skip next char
					} else {
						const v = VISEME_MAP[lower[i]];
						queue.push(v || null); // null = close mouth
					}
				}
				return queue;
			}

			// ─── Three.js setup ──────────────────────────────────────────────────────────
			const canvas = document.getElementById("canvas");
			const section = document.getElementById("avatar-section");

			const renderer = new THREE.WebGLRenderer({
				canvas,
				alpha: true,
				antialias: true,
			});
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.outputEncoding = 3001;

			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 20);
			camera.position.set(0, 0.8, 1.5);

			const ambient = new THREE.AmbientLight(0xffffff, 0.6);
			scene.add(ambient);
			const dirLight = new THREE.DirectionalLight(0x00f5ff, 0.2);
			dirLight.position.set(1, 2, 3);
			scene.add(dirLight);
			const backLight = new THREE.DirectionalLight(0xb44fff, 0.8);
			backLight.position.set(-2, 1, -2);
			scene.add(backLight);

			function resize() {
				const w = section.clientWidth;
				const h = section.clientHeight;
				renderer.setSize(w, h);
				camera.aspect = w / h;
				camera.updateProjectionMatrix();
			}
			resize();
			window.addEventListener("resize", resize);

			// ─── Natural pose ────────────────────────────────────────────────────────────
			function getBone(vrm, name) {
				return vrm.humanoid?.getNormalizedBoneNode(name);
			}

			function applyNaturalPose(vrm) {
				// Formal standing pose: hands clasped at waist, upright posture
				const leftShoulder = getBone(vrm, "leftShoulder");
				const rightShoulder = getBone(vrm, "rightShoulder");
				const leftUpperArm = getBone(vrm, "leftUpperArm");
				const rightUpperArm = getBone(vrm, "rightUpperArm");
				const leftLowerArm = getBone(vrm, "leftLowerArm");
				const rightLowerArm = getBone(vrm, "rightLowerArm");
				const leftHand = getBone(vrm, "leftHand");
				const rightHand = getBone(vrm, "rightHand");
				const spine = getBone(vrm, "spine");
				const chest = getBone(vrm, "chest");
				const neck = getBone(vrm, "neck");
				const head = getBone(vrm, "head");
				const hips = getBone(vrm, "hips");
				const leftThigh = getBone(vrm, "leftUpperLeg");
				const rightThigh = getBone(vrm, "rightUpperLeg");

				// Hips neutral
				if (hips) hips.rotation.set(0, 0, 0);

				// Spine straight and upright
				if (spine) spine.rotation.set(0, 0, 0);
				if (chest) chest.rotation.set(0, 0, 0);

				// Shoulders level
				if (leftShoulder) leftShoulder.rotation.set(0, 0, 0);
				if (rightShoulder) rightShoulder.rotation.set(0, 0, 0);

				// Arms spread wide open at shoulder height
				if (leftUpperArm) {
					leftUpperArm.rotation.set(1, -1.8, 0); // extended left
				}
				if (leftLowerArm) {
					leftLowerArm.rotation.set(0, 0, -0.2); // slight bend, palm back
				}
				if (leftHand) {
					leftHand.rotation.set(0, -0.2, 0);
				}

				// Right arm: mirror
				if (rightUpperArm) {
					rightUpperArm.rotation.set(1, 1.8, 0); // extended right
				}
				if (rightLowerArm) {
					rightLowerArm.rotation.set(0, 0, 0);
				}
				if (rightHand) {
					rightHand.rotation.set(0, 0.2, 0);
				}

				// Head: neutral, slight forward tilt for attentiveness
				if (neck) neck.rotation.set(0.05, 0, 0);
				if (head) head.rotation.set(-0.02, 0, 0);

				// Legs straight, slightly apart
				if (leftThigh) leftThigh.rotation.set(0, 0, 0.05);
				if (rightThigh) rightThigh.rotation.set(0, 0, -0.05);
			}

			// ─── VRM loader ───────────────────────────────────────────────────────────────
			function loadVRM() {
				const loader = new THREE.GLTFLoader();
				loader.register(
					(parser) => new THREE_VRM.VRMLoaderPlugin(parser),
				);

				loader.load(
					"./avatar/Suyo.vrm",
					(gltf) => {
						vrm = gltf.userData.vrm;
						scene.add(vrm.scene);
						THREE_VRM.VRMUtils.rotateVRM0(vrm);
						vrm.scene.position.set(0, -0.8, 0);
						applyNaturalPose(vrm);
						console.log("VRM loaded!");
						hideLoading();
					},
					(progress) => {
						console.log(
							"VRM loading...",
							((progress.loaded / progress.total) * 100).toFixed(
								1,
							) + "%",
						);
					},
					(error) => {
						console.warn("VRM failed, using fallback:", error);
						useFallback();
					},
				);
			}

			function useFallback() {
				document.getElementById("canvas").style.display = "none";
				document.getElementById("fallback").style.display = "flex";
				hideLoading();
			}

			function hideLoading() {
				const el = document.getElementById("loading");
				el.classList.add("hidden");
				setTimeout(() => el.remove(), 700);
			}

			// ─── Animation loop ───────────────────────────────────────────────────────────
			const clock = new THREE.Clock();
			let lastBlink = 0;
			let blinkVal = 0;
			let eyeLookX = 0,
				eyeLookY = 0;
			let happyVal = 0;

			function setExpr(name, val) {
				try {
					vrm?.expressionManager?.setValue(
						name,
						Math.max(0, Math.min(1, val)),
					);
				} catch (_) {}
			}

			function clearAllVisemes() {
				ALL_VISEMES.forEach((v) => setExpr(v, 0));
			}

			function animate() {
				requestAnimationFrame(animate);
				const delta = clock.getDelta();
				const t = clock.getElapsedTime();

				if (vrm) {
					// ── Idle sway ──
					vrm.scene.rotation.y = Math.sin(t * 0.4) * 0.06;
					vrm.scene.position.y = -0.8 + Math.sin(t * 0.6) * 0.01;

					// ── Blinking ──
					const blinkInterval = 3.5 + Math.sin(t * 0.1) * 1.5;
					if (t - lastBlink > blinkInterval) {
						blinkVal = 1;
						lastBlink = t;
					}
					if (blinkVal > 0) {
						setExpr("blink", blinkVal);
						blinkVal = Math.max(0, blinkVal - delta * 8);
					} else {
						setExpr("blink", 0);
					}

					// ── Eye wander (idle) ──
					if (!isSpeaking) {
						eyeLookX += (Math.sin(t * 0.3) * 0.2 - eyeLookX) * 0.02;
						eyeLookY += (Math.sin(t * 0.2) * 0.1 - eyeLookY) * 0.02;
						setExpr("lookLeft", Math.max(0, eyeLookX));
						setExpr("lookRight", Math.max(0, -eyeLookX));
						setExpr("lookUp", Math.max(0, eyeLookY));
						setExpr("lookDown", Math.max(0, -eyeLookY));
					}

					// ── Emotion: happy while speaking, relaxed when idle ──
					const happyTarget = isSpeaking ? 0.8 : 0;
					happyVal += (happyTarget - happyVal) * 0.5;
					setExpr("happy", happyVal);
					setExpr("relaxed", isSpeaking ? 0 : 0.3);

					// ── Viseme sync from text ──
					if (isSpeaking && visemeQueue.length > 0) {
						visemeTimer += delta;
						const visemeSpeed = 0.07; // seconds per viseme
						if (visemeTimer >= visemeSpeed) {
							visemeTimer = 0;
							clearAllVisemes();
							const currentViseme =
								visemeQueue[visemeIdx % visemeQueue.length];
							if (currentViseme) {
								setExpr(
									currentViseme,
									0.7 + Math.sin(t * 8) * 0.2,
								);
							}
							visemeIdx++;
							// loop queue until speaking stops
							if (visemeIdx >= visemeQueue.length) visemeIdx = 0;
						}
					} else if (!isSpeaking) {
						clearAllVisemes();
						visemeIdx = 0;
						visemeTimer = 0;
					}

					vrm.update(delta);
				}

				renderer.render(scene, camera);
			}

			animate();
			loadVRM();

			// ─── WebSocket ───────────────────────────────────────────────────────────────
			const wsDot = document.getElementById("ws-dot");
			const wsLabel = document.getElementById("ws-label");

			function connectWS() {
				const ws = new WebSocket("ws://localhost:8765");

				ws.onopen = () => {
					wsDot.classList.add("active");
					wsLabel.textContent = "CONNECTED";
				};

				ws.onclose = () => {
					wsDot.classList.remove("active");
					wsLabel.textContent = "DISCONNECTED";
					setTimeout(connectWS, 2000); // auto-reconnect
				};

				ws.onmessage = (event) => {
					const data = JSON.parse(event.data);
					handleMessage(data);
				};
			}

			connectWS();

			// ─── Message handler ──────────────────────────────────────────────────────────
			function handleMessage({ keywords, transcription }) {
				// Update transcription
				const tBox = document.getElementById("transcription-box");
				const tText = document.getElementById("transcription-text");
				tText.style.color = "";
				tText.style.fontStyle = "";
				tText.textContent = transcription;
				tBox.classList.add("active");
				setTimeout(() => tBox.classList.remove("active"), 2000);

				// Animate mouth
				setSpeaking(true);
				const words = transcription.split(" ").length;
				setTimeout(
					() => setSpeaking(false),
					Math.min(words * 350, 4000),
				);

				// Show keywords
				showKeywords(keywords);

				// Add to history
				addHistory(transcription, keywords);
			}

			function setSpeaking(val) {
				isSpeaking = val;
				document
					.getElementById("waveform")
					.classList.toggle("speaking", val);
				const mouth = document.getElementById("fallback-mouth");
				if (mouth) mouth.classList.toggle("speaking", val);
			}

			// ─── Keywords display ─────────────────────────────────────────────────────────
			const existingTags = [];

			function showKeywords(keywords) {
				const container = document.getElementById("keywords-container");

				// Fade out old ones
				existingTags.forEach((el) => {
					el.classList.add("fade-out");
					setTimeout(() => el.remove(), 500);
				});
				existingTags.length = 0;

				keywords.forEach((kw, i) => {
					setTimeout(() => {
						const tag = document.createElement("div");
						const color = colors[colorIdx % colors.length];
						colorIdx++;
						tag.className = `keyword-tag ${color}`;
						tag.innerHTML = `<span class="dot"></span>${kw}`;
						container.appendChild(tag);
						existingTags.push(tag);
					}, i * 120);
				});
			}

			// ─── History log ─────────────────────────────────────────────────────────────
			function addHistory(transcription, keywords) {
				const log = document.getElementById("history-log");
				const item = document.createElement("div");
				item.className = "history-item";
				const now = new Date().toLocaleTimeString("en-US", {
					hour12: false,
				});
				item.innerHTML = `<div class="time">${now}</div>${transcription}`;
				log.prepend(item);

				// Keep last 20 entries
				while (log.children.length > 20) log.lastChild.remove();
			}
		</script>
	</body>
</html>
